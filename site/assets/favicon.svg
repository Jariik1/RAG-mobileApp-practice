<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="kvyik">
  <defs>
    <linearGradient id="ik-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9a3c"/>
      <stop offset=".55" stop-color="#ff6a14"/>
      <stop offset="1" stop-color="#e8530a"/>
    </linearGradient>
  </defs>
  <!-- rounded orange tile -->
  <rect width="64" height="64" rx="15" fill="url(#ik-bg)"/>
  <!-- dark monospace [ɪk] mark (centre glyph from the icon sheet) -->
