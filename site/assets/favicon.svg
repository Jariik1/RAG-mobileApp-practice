        font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,'DejaVu Sans Mono',monospace"
        font-size="23" font-weight="700" letter-spacing="-1" fill="#2a1405">[ɪk]</text>
</svg>
